services:
  - type: web
    name: agentic-exchange-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash ./start_backend.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: CARGO_HOME
        value: /opt/render/project/src/.cargo
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ALGOD_ADDRESS
        value: https://testnet-api.algonode.cloud
      - key: ALGOD_TOKEN
        value: ""
      - key: CONTRACT_APP_ID
        value: "758126516"
      - key: CONTRACT_BOX_FUNDING
        value: "160000"
      - key: MONGODB_DB
        value: agentic_exchange
      - key: MONGODB_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
        value: https://agenticex.netlify.app